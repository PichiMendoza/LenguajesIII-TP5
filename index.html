<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <div class="form-card shadow-sm rounded-4 bg-white p-4 mt-5">
        <h2 class="form-title text-center mb-4">Registro de Usuario</h2>

        <div id="formResult" class="alert d-none" role="alert"></div>

        <form id="formulario" novalidate>

            <div class="mb-3">
                <p>Nombre</p>
                <input type="text" class="form-control" id="nombre" placeholder="Ingrese su nombre">
                <div class="invalid-feedback"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Apellido</label>
                <input type="text" class="form-control" id="apellido" placeholder="Ingrese su apellido">
                <div class="invalid-feedback"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="usuario@ucasal.edu.ar">
                <div class="invalid-feedback"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha de Nacimiento</label>
                <input type="date" class="form-control" id="fechaNacimiento">
                <div class="invalid-feedback"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="Al menos 6 caracteres">
                <div class="invalid-feedback"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirmar contraseña</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="Repita su contraseña">
                <div class="invalid-feedback"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Enviar</button>
        </form>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
